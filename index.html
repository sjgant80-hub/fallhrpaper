<style>
:root{--void:#0b0a0f;--void-2:#13121a;--ink:#1a1922;--line:#2a2934;--line-soft:#1f1e28;--cream:#e6e1d6;--cream-dim:#a8a395;--cream-muted:#6e6a5e;--brass:#b8974a;--amber:#ff8c00;--ox:#8b1a1a;--green:#4ade80;--red:#ef4444;--blue:#60a5fa;--yellow:#fbbf24;--serif:Georgia,'Libre Baskerville',ui-serif,serif;--sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;--mono:'IBM Plex Mono','SF Mono',ui-monospace,Menlo,monospace}
*{margin:0;padding:0;box-sizing:border-box}html,body{background:var(--void);color:var(--cream);font:14px/1.55 var(--sans);min-height:100dvh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;background:transparent;border:none;color:inherit}input,textarea,select{font-family:inherit;background:var(--ink);border:1px solid var(--line);color:var(--cream);border-radius:3px;padding:7px 10px;outline:none;font-size:13px}input:focus,textarea:focus,select:focus{border-color:var(--brass)}a{color:var(--brass)}
.app{min-height:100dvh;display:grid;grid-template-rows:48px 1fr}header{display:flex;align-items:center;border-bottom:1px solid var(--line);background:var(--void-2);user-select:none}.brand{display:flex;align-items:center;gap:10px;padding:0 16px;height:100%;border-right:1px solid var(--line)}.brand .mark{width:28px;height:28px;background:linear-gradient(135deg,var(--brass),var(--amber));border-radius:5px;display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:16px;color:var(--void)}.brand .name{font-family:var(--serif);font-weight:600;font-size:14px}.brand .seal{font-family:var(--mono);font-size:9px;color:var(--cream-muted);letter-spacing:0.18em;text-transform:uppercase}
nav.tabs{display:flex;flex:1;overflow-x:auto;align-items:stretch}nav.tabs button{padding:0 14px;font-size:12px;color:var(--cream-dim);letter-spacing:0.04em;display:flex;align-items:center;border-right:1px solid var(--line-soft);height:100%;white-space:nowrap;border-top:2px solid transparent}nav.tabs button:hover{background:var(--ink);color:var(--cream)}nav.tabs button.active{background:var(--ink);color:var(--brass);border-top-color:var(--brass)}
.tools-r{display:flex;align-items:center;gap:5px;padding:0 14px;height:100%;border-left:1px solid var(--line)}.tool-btn{padding:5px 11px;border-radius:3px;font-size:11px;color:var(--cream-dim);letter-spacing:0.06em;text-transform:uppercase;font-family:var(--mono);border:1px solid var(--line)}.tool-btn:hover{background:var(--ink);color:var(--cream);border-color:var(--brass)}
main{padding:18px 22px 60px;overflow-y:auto;max-width:1200px;margin:0 auto;width:100%}
.disclaimer{background:rgba(139,26,26,0.15);border:1px solid var(--ox);border-left:3px solid var(--ox);border-radius:3px;padding:12px 16px;margin-bottom:18px;font-size:12px}.disclaimer strong{color:var(--brass)}
.section-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;gap:14px;flex-wrap:wrap}.section-h h2{font-family:var(--serif);font-size:18px;font-weight:600}.section-h .sub{font-family:var(--mono);font-size:11px;color:var(--cream-muted);letter-spacing:0.08em;text-transform:uppercase}.section-h .actions{display:flex;gap:6px}
.card{background:var(--void-2);border:1px solid var(--line);border-radius:4px;padding:16px 18px;margin-bottom:14px}.card h3{font-family:var(--serif);font-size:14px;font-weight:600;margin-bottom:10px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}.field label{display:block;font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px}.field input,.field select,.field textarea{width:100%}.field .hint{font-size:10px;color:var(--cream-muted);margin-top:3px;font-family:var(--mono)}
.btn{padding:7px 14px;border:1px solid var(--brass);border-radius:3px;font-size:12px;color:var(--cream);background:transparent}.btn:hover{border-color:var(--amber);color:var(--amber)}.btn.brass{background:var(--brass);color:var(--void);border-color:var(--brass);font-weight:600}.btn.brass:hover{background:var(--amber)}.btn.sm{padding:4px 9px;font-size:11px}.btn.ghost{border-color:var(--line);color:var(--cream-dim)}.btn.danger:hover{border-color:var(--red);color:var(--red)}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}th,td{padding:7px 10px;border-bottom:1px solid var(--line-soft);text-align:left;vertical-align:top}th{color:var(--brass);font-family:var(--mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;font-weight:600}
.pill{display:inline-block;padding:2px 7px;border-radius:11px;font-family:var(--mono);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;border:1px solid var(--brass);color:var(--brass)}.pill.draft{border-color:var(--cream-muted);color:var(--cream-muted)}.pill.issued{border-color:var(--green);color:var(--green)}
.tpl-list{display:flex;flex-direction:column;gap:6px}.tpl-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border:1px solid var(--line);border-radius:3px;cursor:pointer;background:var(--void-2)}.tpl-row:hover{border-color:var(--brass);background:var(--ink)}.tpl-row .nm{font-weight:600;font-size:13px}.tpl-row .sub{font-size:11px;color:var(--cream-muted);font-family:var(--mono)}
.doc-stage{display:grid;grid-template-columns:340px 1fr;gap:18px}.doc-side{display:flex;flex-direction:column;gap:12px}
.section-edit{margin-bottom:8px;border:1px solid var(--line);border-radius:3px;overflow:hidden}.section-edit .hd{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--ink);font-size:12px}.section-edit .nm{font-weight:600}.section-edit .tg{font-family:var(--mono);font-size:9px;color:var(--cream-muted);letter-spacing:0.08em;text-transform:uppercase}.section-edit textarea{width:100%;border:none;border-top:1px solid var(--line);padding:8px 10px;font-size:12px;line-height:1.6;min-height:60px;resize:vertical}.section-edit.locked{border-color:var(--ox)}.section-edit.locked .hd{background:rgba(139,26,26,0.2)}.section-edit.locked .tg{color:var(--ox)}.section-edit.locked textarea{color:var(--cream-dim)}
.paper{background:#faf8f4;color:#1a1611;font-family:Georgia,serif;padding:40px 50px;border-radius:3px;font-size:13px;line-height:1.8;min-height:400px;max-height:80vh;overflow:auto}.paper strong{font-weight:700}.paper .doc-meta{font-family:var(--mono);font-size:10px;color:#888;border-bottom:1px solid #ccc;padding-bottom:8px;margin-bottom:16px}.paper .clause-locked{background:#f0ebd8;border-left:3px solid #8b1a1a;padding:8px 14px;margin:10px 0;font-size:12px}.paper .sig-block{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:24px}.paper .sig-line{border-bottom:1px solid #000;min-height:34px;margin-bottom:4px}.paper .placeholder-empty{color:#c00;background:#fee;padding:0 4px;border-radius:2px;font-family:var(--mono);font-size:11px}
.empty{padding:24px;text-align:center;color:var(--cream-muted);font-style:italic;font-size:12px}
.chat{display:flex;flex-direction:column;gap:10px;max-height:60vh;overflow-y:auto;padding:6px}.msg{padding:10px 14px;border-radius:6px;max-width:88%;font-size:13px;line-height:1.55;white-space:pre-wrap}.msg.user{background:var(--ink);align-self:flex-end}.msg.bot{background:var(--void-2);border:1px solid var(--line);border-left:2px solid var(--brass);align-self:flex-start}.msg .src{font-family:var(--mono);font-size:10px;color:var(--cream-muted);margin-top:6px;padding-top:6px;border-top:1px dashed var(--line)}.chat-input{display:flex;gap:8px;margin-top:10px}.chat-input input{flex:1;padding:11px 14px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;padding:18px;z-index:900;backdrop-filter:blur(4px)}.modal-bg.open{display:flex}.modal{background:var(--void-2);border:1px solid var(--brass);border-radius:4px;padding:22px;max-width:700px;width:100%;max-height:90vh;overflow:auto}.modal h2{font-family:var(--serif);font-size:17px;margin-bottom:14px}.modal .actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--brass);color:var(--void);padding:9px 18px;border-radius:3px;font-family:var(--mono);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;font-weight:700;opacity:0;transition:all 0.22s;z-index:1100;pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:760px){nav.tabs button{padding:0 10px;font-size:11px}main{padding:14px 14px 50px}.row{grid-template-columns:1fr}.doc-stage{grid-template-columns:1fr}}
</style>

<div class="app">
<header>
  <div class="brand"><div class="mark">◊</div><div><div class="name">FallHRPaper</div></div><div class="seal">v1 · prime 1019</div></div>
  <nav class="tabs" id="tabNav"></nav>
  <div class="tools-r"><button class="tool-btn" id="tierBadge" onclick="openModal('settings')">T0</button><button class="tool-btn" onclick="openModal('settings')">⚙</button></div>

<script>
'use strict';
const TOOLNAME='fallhrpaper',VERSION='1.0.0',PRIME=1019,STORE='fallhrpaper-v1';
const TABS=[{id:'templates',label:'templates'},{id:'generate',label:'generate'},{id:'documents',label:'documents'},{id:'firm',label:'firm'},{id:'qa',label:'Q&A'}];

const TEMPLATE_DEFS=[
  {id:'offer-letter',name:'Offer Letter',code:'OFR-01',cat:'pre-employment',desc:'Conditional employment offer',
   sections:[
    {id:'letter',name:'Letter',locked:false,text:'**{{firm.name}}**\n{{firm.address}}\n\nDate: {{ctx.date}}\n\n{{employee.name}}\n{{employee.address}}\n\nDear {{employee.firstName}},\n\n**Offer of Employment — {{ctx.jobTitle}}**\n\nI am delighted to offer you the position of {{ctx.jobTitle}}, reporting to {{ctx.reportingTo}}, at {{firm.name}}.\n\nThis offer is subject to the conditions set out below. Please confirm acceptance by returning a signed copy within 7 days.'},
    {id:'terms',name:'Key Terms',locked:false,text:'**Start date:** {{ctx.startDate}}\n**Salary:** £{{ctx.salary}} per annum, paid monthly in arrears\n**Hours:** {{ctx.hours}} per week\n**Holiday:** {{ctx.holidayDays}} days per year (including bank holidays)\n**Probation period:** {{ctx.probationMonths}} months\n**Notice during probation:** 1 week\n**Notice after probation:** {{ctx.noticeWeeks}} weeks\n**Place of work:** {{ctx.workplace}}'},
    {id:'conditions',name:'Conditions',locked:true,text:'**This offer is conditional on:**\n1. Verification of your Right to Work in the UK (Immigration, Asylum and Nationality Act 2006). You must provide acceptable documents before your start date.\n2. Receipt of satisfactory references from your stated referees.\n3. Where applicable, satisfactory enhanced DBS check.\n4. Where applicable, evidence of qualifications stated in your application.\n5. Confirmation of any pre-existing medical conditions that may affect your ability to perform the role, with reasonable adjustments considered under the Equality Act 2010.'},
    {id:'next',name:'Next Steps',locked:false,text:'A full Statement of Employment Particulars under Employment Rights Act 1996 s.1 will be provided to you on or before your first day of work.\n\nWe look forward to welcoming you to {{firm.name}}.\n\nYours sincerely,\n{{ctx.signatoryName}}\n{{ctx.signatoryTitle}}\n{{firm.name}}'},
    {id:'sigs',name:'Acceptance',locked:false,text:'[SIGNATURE_BLOCK]'},
   ]},
  {id:'s1-statement',name:'S.1 Statement of Employment Particulars',code:'S1-01',cat:'core',desc:'Written statement required day one (ERA 1996 s.1)',
   sections:[
    {id:'header',name:'Header',locked:false,text:'**WRITTEN STATEMENT OF EMPLOYMENT PARTICULARS**\n\nIssued pursuant to section 1 of the Employment Rights Act 1996\n\nBetween: {{firm.name}} ("the Employer")\n{{firm.address}}\nCompany no: {{firm.companyNo}}\n\nAnd: {{employee.name}} ("the Employee")\n{{employee.address}}\n\nDate of issue: {{ctx.date}}\n(Must be on or before first day of work — ERA 1996 s.1)'},
    {id:'parties',name:'Parties & Dates',locked:false,text:'**Employment start date:** {{ctx.startDate}}\n**Continuous service start date:** {{ctx.continuousServiceDate}}\n**Job title:** {{ctx.jobTitle}}\n**Job description:** {{ctx.jobDescription}}\n**Place of work:** {{ctx.workplace}}'},
    {id:'pay',name:'Pay & Hours',locked:false,text:'**Annual salary:** £{{ctx.salary}}\n**Payment method:** BACS, paid monthly in arrears on the last working day of the month\n**Hours of work:** {{ctx.hours}} hours per week, normally {{ctx.workingPattern}}\n**Overtime:** {{ctx.overtimePolicy}}'},
    {id:'leave',name:'Holiday & Sick Pay',locked:false,text:'**Annual leave entitlement:** {{ctx.holidayDays}} days per leave year (1 January – 31 December), inclusive of bank holidays. Pro-rated in year of joining/leaving.\n\n**Sick pay:** Statutory Sick Pay (SSP) applies. {{ctx.companyScheme}}'},
    {id:'pension',name:'Pension',locked:false,text:'**Pension:** Auto-enrolment scheme operated under the Pensions Act 2008. Provider: {{ctx.pensionProvider}}. Minimum contributions: employer 3%, employee 5% (8% total) of qualifying earnings.'},
    {id:'notice',name:'Notice & Termination',locked:false,text:'**Notice period:**\n- During probation: 1 week (either party)\n- After probation, by Employee: {{ctx.empNoticeWeeks}} weeks\n- After probation, by Employer: statutory minimum (1 week for 1 month-2 years service, then 1 week per year up to 12 weeks) OR {{ctx.empNoticeWeeks}} weeks, whichever is longer'},
    {id:'discgriev',name:'Disciplinary & Grievance',locked:false,text:'**Disciplinary procedure:** Set out in the Disciplinary Procedure document, available on the staff intranet / from HR.\n**Grievance procedure:** Set out in the Grievance Procedure document, available on the staff intranet / from HR.\n\nBoth procedures follow the ACAS Code of Practice on Disciplinary and Grievance Procedures.'},
    {id:'mandatory',name:'Mandatory Wording',locked:true,text:'Under Employment Rights Act 1996 s.1, this statement constitutes the principal statement of employment particulars and must be issued on or before the first day of work. It is not the contract of employment in itself — the contract is formed by the offer and acceptance — but failure to issue this statement entitles the Employee to claim 2-4 weeks pay at an Employment Tribunal under Employment Act 2002 s.38, provided another claim succeeds.\n\nNo provision in this statement reduces the Employee\'s statutory rights. All references to legislation are to the legislation as amended from time to time.'},
    {id:'sigs',name:'Signatures',locked:false,text:'[SIGNATURE_BLOCK]'},
   ]},
  {id:'employment-contract',name:'Employment Contract',code:'EC-01',cat:'core',desc:'Full contract of employment (supplements S.1 statement)',
   sections:[
    {id:'header',name:'Header',locked:false,text:'**CONTRACT OF EMPLOYMENT**\n\nBetween: {{firm.name}} ("the Company")\nAnd: {{employee.name}} ("the Employee")\nDate: {{ctx.date}}'},
    {id:'commencement',name:'Commencement',locked:false,text:'1. **Commencement.** Your employment with the Company will commence on {{ctx.startDate}}. No previous employment counts as continuous service.'},
    {id:'duties',name:'Duties',locked:false,text:'2. **Duties.** You are employed as {{ctx.jobTitle}}. Your duties are set out in the Job Description provided. The Company may reasonably require you to perform other duties consistent with your skills and experience.\n\n3. **Place of work.** Your normal place of work is {{ctx.workplace}}. The Company may require reasonable travel within the UK in performance of your duties.'},
    {id:'remuneration',name:'Remuneration',locked:false,text:'4. **Salary.** Your starting salary is £{{ctx.salary}} per annum, payable monthly by BACS on the last working day of the month.\n\n5. **Salary review.** Your salary will be reviewed annually in {{ctx.reviewMonth}}. The Company is not obliged to award an increase.\n\n6. **Pension.** You will be auto-enrolled in the Company pension scheme per the Pensions Act 2008 unless you are not an eligible jobholder or you opt out within the prescribed period.'},
    {id:'workingTime',name:'Working Time',locked:false,text:'7. **Hours.** Your normal hours of work are {{ctx.hours}} per week, {{ctx.workingPattern}}. You may be required to work additional hours from time to time without further remuneration.\n\n8. **Working Time Regulations 1998.** Your hours of work may exceed an average of 48 hours per week. By signing this contract you agree to opt out of the 48-hour weekly limit under Regulation 4. You may withdraw this opt-out by giving 3 months written notice.'},
    {id:'leave',name:'Leave',locked:false,text:'9. **Annual leave.** Your entitlement is {{ctx.holidayDays}} days per leave year (1 January – 31 December) including bank holidays. Leave must be taken with prior approval. Up to 5 days may be carried over to the following year with manager approval.\n\n10. **Sickness absence.** You must notify your line manager by 9:30am on the first day of absence. Self-certification for up to 7 calendar days; fit note required from day 8.\n\n11. **Statutory Sick Pay (SSP).** Will be paid in accordance with the prevailing rate (£118.75/week 2025/26) for qualifying days after 3 waiting days, up to 28 weeks.'},
    {id:'restrictive',name:'Restrictive Covenants',locked:false,text:'12. **Confidentiality.** You shall not, during or after your employment, disclose confidential information of the Company or its clients except in the proper performance of your duties or as required by law.\n\n13. **Non-solicitation.** For 6 months after termination you shall not solicit business from any client of the Company with whom you had material dealings in the 12 months prior to termination.\n\n14. **Non-compete.** For 3 months after termination you shall not work for any business in direct competition with the Company\'s core business within a 25-mile radius of your normal place of work. This restriction is reasonable to protect the Company\'s legitimate business interests.'},
    {id:'termination',name:'Termination',locked:false,text:'15. **Notice.** Either party may terminate this contract by giving written notice as follows:\n- During probation period ({{ctx.probationMonths}} months): 1 week\n- After probation: {{ctx.noticeWeeks}} weeks\n\n16. **Summary dismissal.** The Company may terminate without notice in cases of gross misconduct.\n\n17. **Payment in lieu of notice (PILON).** The Company may, at its discretion, pay basic salary in lieu of notice.'},
    {id:'governing',name:'Governing Law',locked:true,text:'18. **Governing law.** This contract is governed by the law of England and Wales. The parties submit to the exclusive jurisdiction of the English courts.\n\n19. **Statutory rights preserved.** Nothing in this contract reduces the Employee\'s statutory rights under Employment Rights Act 1996, Working Time Regulations 1998, Equality Act 2010, or any other applicable legislation.\n\n20. **Variation.** Any variation must be in writing, signed by both parties.\n\n21. **Entire agreement.** This contract and the S.1 written statement of particulars constitute the entire agreement between the parties regarding employment.'},
    {id:'sigs',name:'Signatures',locked:false,text:'[SIGNATURE_BLOCK]'},
   ]},
  {id:'invite-disciplinary',name:'Disciplinary Hearing Invite',code:'DISC-01',cat:'discipline',desc:'Invitation to formal disciplinary hearing (ACAS Code)',
   sections:[
    {id:'letter',name:'Letter',locked:false,text:'**{{firm.name}}**\n{{firm.address}}\n\nDate: {{ctx.date}}\nPrivate & Confidential\n\n{{employee.name}}\n{{employee.address}}\n\nDear {{employee.firstName}},\n\n**Invitation to attend a disciplinary hearing**\n\nFollowing the investigation into the matter set out below, I am writing to invite you to attend a formal disciplinary hearing.'},
    {id:'allegations',name:'Allegations',locked:false,text:'**Allegations:**\n{{ctx.allegations}}\n\n**Evidence relied upon:**\n{{ctx.evidence}}\n\nCopies of the investigation report and supporting documents are enclosed with this letter.'},
    {id:'hearing',name:'Hearing Details',locked:false,text:'**Hearing date:** {{ctx.hearingDate}}\n**Time:** {{ctx.hearingTime}}\n**Location:** {{ctx.hearingLocation}}\n**Chair:** {{ctx.chairName}}, {{ctx.chairTitle}}\n**Note-taker:** {{ctx.noteTaker}}'},
    {id:'rights',name:'Your Rights',locked:true,text:'**Your statutory and ACAS-Code rights at this hearing:**\n\n1. **Right to be accompanied** (Employment Relations Act 1999 s.10): you may be accompanied by a fellow worker, a trade union official, or a certified trade union representative. Please confirm in advance who will accompany you.\n\n2. **Right to advance notice** (ACAS Code): you have received this notice with reasonable time to prepare. If you require more time, please notify {{ctx.contactName}} immediately.\n\n3. **Right to call witnesses** and present evidence in your defence.\n\n4. **Right to ask questions** of any witnesses called by the Company.\n\n5. **Right to appeal** any decision arising from this hearing. Appeal must be in writing within 5 working days of the decision letter.\n\nUnreasonable failure to follow the ACAS Code may result in tribunal awards being adjusted by up to 25% (Trade Union and Labour Relations (Consolidation) Act 1992 s.207A).'},
    {id:'outcome',name:'Possible Outcomes',locked:false,text:'**Possible outcomes:**\nThe outcomes that may result from this hearing include:\n- No further action\n- Verbal warning\n- Written warning\n- Final written warning\n- {{ctx.severeOutcome}}\n\nThe outcome will be confirmed in writing within {{ctx.outcomeDays}} working days of the hearing.'},
    {id:'close',name:'Close',locked:false,text:'If you have any questions about the procedure or arrangements, please contact {{ctx.contactName}} on {{ctx.contactPhone}} or {{ctx.contactEmail}}.\n\nYours sincerely,\n{{ctx.signatoryName}}\n{{ctx.signatoryTitle}}\n{{firm.name}}'},
   ]},
  {id:'grievance-response',name:'Grievance Outcome Letter',code:'GR-01',cat:'discipline',desc:'Response to employee grievance after formal hearing',
   sections:[
    {id:'letter',name:'Letter',locked:false,text:'**{{firm.name}}**\n{{firm.address}}\n\nDate: {{ctx.date}}\nPrivate & Confidential\n\n{{employee.name}}\n{{employee.address}}\n\nDear {{employee.firstName}},\n\n**Grievance outcome: {{ctx.grievanceRef}}**\n\nThank you for raising your grievance, which we received on {{ctx.grievanceDate}}. This letter confirms the outcome of the grievance hearing held on {{ctx.hearingDate}}.'},
    {id:'summary',name:'Summary',locked:false,text:'**Summary of grievance:**\n{{ctx.grievanceSummary}}\n\n**Summary of investigation:**\n{{ctx.investigationSummary}}\n\n**Findings:**\n{{ctx.findings}}'},
    {id:'decision',name:'Decision',locked:false,text:'**Decision:**\nYour grievance is {{ctx.outcome}}.\n\n**Reasons:**\n{{ctx.reasons}}\n\n**Actions to be taken:**\n{{ctx.actions}}'},
    {id:'appeal',name:'Right of Appeal',locked:true,text:'**Right of appeal (ACAS Code, paragraph 47):**\n\nIf you are not satisfied with this decision, you have the right to appeal. Your appeal must be made in writing within 5 working days of receipt of this letter, addressed to {{ctx.appealContact}}, setting out the grounds of your appeal.\n\nThe appeal hearing will be conducted by a more senior manager not previously involved in this matter, where reasonably practicable. You will have the right to be accompanied at the appeal hearing.\n\nUnreasonable failure on either side to follow the ACAS Code may result in tribunal awards being adjusted by up to 25%.'},
    {id:'close',name:'Close',locked:false,text:'I trust this matter is now resolved. Should you wish to discuss any aspect of this outcome informally, please contact me.\n\nYours sincerely,\n{{ctx.signatoryName}}\n{{ctx.signatoryTitle}}'},
   ]},
  {id:'redundancy-notice',name:'Redundancy Notice',code:'RED-01',cat:'termination',desc:'Notice of redundancy after consultation',
   sections:[
    {id:'letter',name:'Letter',locked:false,text:'**{{firm.name}}**\n{{firm.address}}\n\nDate: {{ctx.date}}\nPrivate & Confidential\n\n{{employee.name}}\n{{employee.address}}\n\nDear {{employee.firstName}},\n\n**Notice of dismissal by reason of redundancy**\n\nFurther to the consultation meetings held on {{ctx.consultationDates}}, I write to confirm that your position as {{ctx.jobTitle}} is redundant.'},

    {id:'notice',name:'Notice Period',locked:false,text:'**Notice:**\nYou will receive {{ctx.noticeWeeks}} weeks notice of termination. Your last working day will be {{ctx.lastDayOfWork}}. Your employment will terminate on {{ctx.terminationDate}}.\n\n{{ctx.pilonClause}}'},
    {id:'payments',name:'Payments',locked:false,text:'**Statutory redundancy payment:**\nYou have {{ctx.yearsService}} years continuous service with the Company. Your statutory redundancy payment is calculated as follows (Employment Rights Act 1996 s.162):\n\n- Service under age 22: {{ctx.under22Weeks}} half-weeks pay\n- Service age 22 to 40: {{ctx.age22to40Weeks}} full-weeks pay\n- Service age 41+: {{ctx.age41Weeks}} × 1.5 weeks pay\n\nWeekly pay capped at £{{ctx.weeklyCap}} (statutory cap for 2025/26).\n\n**Total statutory redundancy payment: £{{ctx.redundancyPayment}}**\n\nThis payment is tax-free up to £30,000 (Income Tax (Earnings and Pensions) Act 2003 s.401).\n\n**Additional payments:**\n{{ctx.additionalPayments}}'},
    {id:'statutory',name:'Statutory Information',locked:true,text:'**Right to time off to look for work (ERA 1996 s.52):**\nIf you have at least 2 years continuous service, you are entitled to reasonable paid time off during your notice period to look for new employment or arrange training.\n\n**Right to appeal:**\nYou have the right to appeal against this dismissal. Any appeal must be made in writing within 5 working days of this letter, addressed to {{ctx.appealContact}}.\n\n**Right to a written statement of reasons (ERA 1996 s.92):**\nYou are entitled to a written statement of the reasons for dismissal. This letter constitutes that statement.\n\n**Continuity of employment:**\nYour P45 will be issued at termination. Your statutory redundancy payment is in addition to any notice pay or accrued holiday pay.\n\n**Tribunal time limits:**\nAny claim for unfair dismissal or other tribunal claim must be brought within 3 months less one day of the effective date of termination, following early conciliation with ACAS.'},
    {id:'close',name:'Close',locked:false,text:'I appreciate this is difficult news. We will support you through this transition. If you wish to discuss the calculation or any aspect of this letter, please contact {{ctx.contactName}}.\n\nYours sincerely,\n{{ctx.signatoryName}}\n{{ctx.signatoryTitle}}\n{{firm.name}}'},
   ]},
  {id:'settlement-agreement',name:'Settlement Agreement',code:'SA-01',cat:'termination',desc:'Compromise of claims on termination (s.203 ERA 1996)',
   sections:[
    {id:'header',name:'Header',locked:false,text:'**SETTLEMENT AGREEMENT**\n\nMade under section 203 of the Employment Rights Act 1996 and other relevant statutes\n\nBetween: {{firm.name}} ("the Company")\nAnd: {{employee.name}} ("the Employee")\n\nDate: {{ctx.date}}'},
    {id:'background',name:'Background',locked:false,text:'**Background:**\n1. The Employee was employed by the Company from {{ctx.startDate}} as {{ctx.jobTitle}}.\n2. The parties have agreed that the Employee\'s employment will terminate on {{ctx.terminationDate}} ("Termination Date") by reason of {{ctx.reason}}.\n3. The parties wish to record the terms agreed between them in full and final settlement of all claims arising out of or in connection with the Employee\'s employment and its termination.'},
    {id:'payments',name:'Termination Payments',locked:false,text:'**1. Termination payments:**\n(a) The Company shall pay the Employee {{ctx.noticePayment}} in lieu of notice (subject to PAYE deductions).\n(b) The Company shall pay the Employee £{{ctx.exGratiaAmount}} as an ex gratia compensation payment for loss of office. This is intended to fall within the £30,000 tax-free threshold under Income Tax (Earnings and Pensions) Act 2003 s.401 to the extent permitted.\n(c) Accrued but untaken holiday pay of £{{ctx.holidayPay}} (subject to PAYE).\n(d) Any other agreed payments: {{ctx.otherPayments}}\n\nAll payments will be made within {{ctx.paymentDays}} days of the later of the Termination Date and the date this Agreement is signed by all parties.'},
    {id:'waiver',name:'Waiver of Claims',locked:true,text:'**2. Waiver of claims (statutory requirement):**\n\nThe Employee agrees that the terms of this Agreement are accepted in full and final settlement of all and any claims that the Employee has or may have against the Company arising out of or in connection with the Employee\'s employment or its termination, including without limitation:\n\n(a) unfair dismissal (Employment Rights Act 1996 Part X);\n(b) wrongful dismissal;\n(c) breach of contract;\n(d) unpaid wages or notice pay;\n(e) discrimination, harassment or victimisation under the Equality Act 2010 (on any protected characteristic);\n(f) equal pay (Equality Act 2010 Part 5);\n(g) working time and holiday pay (Working Time Regulations 1998);\n(h) any claim under TUPE 2006;\n(i) any claim for statutory redundancy payment;\n(j) any claim arising under EU-derived law as preserved by Retained EU Law Act 2023.\n\nThis Agreement complies with the statutory requirements under Employment Rights Act 1996 s.203 and similar provisions in the other listed statutes.'},
    {id:'adviser',name:'Independent Adviser',locked:true,text:'**3. Independent legal advice (statutory requirement):**\n\nThe Employee confirms that the Employee has received advice from a relevant independent adviser, as defined in section 203(3A) of the Employment Rights Act 1996, as to the terms and effect of this Agreement, and in particular its effect on the Employee\'s ability to pursue rights before an Employment Tribunal.\n\n**Adviser:** {{ctx.adviserName}}\n**Firm:** {{ctx.adviserFirm}}\n**Insurance/regulator:** {{ctx.adviserInsurance}}\n\nThe adviser\'s certificate is attached at Schedule 1.\n\nThe Company shall contribute up to £{{ctx.adviserContribution}} (plus VAT) towards the Employee\'s legal fees, paid directly to the adviser firm on production of an invoice.'},
    {id:'restrictions',name:'Post-Termination Restrictions',locked:false,text:'**4. Post-termination obligations:**\n(a) The Employee shall continue to be bound by the restrictive covenants in clauses 12-14 of the original contract of employment.\n(b) The Employee shall not make any disparaging statements about the Company, its officers, employees or business. The Company gives the Employee a reciprocal undertaking in respect of the Employee.\n(c) Confidentiality: the terms of this Agreement shall remain confidential save to the Employee\'s immediate family, professional advisers and tax authorities.\n(d) Return of property: the Employee shall return all Company property by the Termination Date.'},

    {id:'governing',name:'General',locked:true,text:'**6. General:**\n(a) This Agreement constitutes the entire agreement between the parties and supersedes all prior representations.\n(b) This Agreement is governed by the law of England and Wales. The parties submit to the exclusive jurisdiction of the English courts.\n(c) The Agreement is conditional on the Employee receiving the independent legal advice required by clause 3.\n(d) Each party shall bear its own costs save as provided in clause 3.\n(e) If any provision is held to be unenforceable, the remaining provisions shall continue in full force.'},
    {id:'sigs',name:'Signatures',locked:false,text:'[SIGNATURE_BLOCK]'},

let state={active:'templates',firm:null,employees:[],documents:[],audit:[],
  ui:{selectedTemplate:null,selectedEmployee:null,editingSections:{},extraContext:'',chat:[]},
  settings:{anthropicKey:'',auditChain:true}};

const $=(s,p=document)=>p.querySelector(s);const uid=p=>(p||'')+'_'+Math.random().toString(36).slice(2,11);const now=()=>Date.now();
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const dateStr=ts=>{if(!ts)return '—';return new Date(ts).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})};
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),1900)}
async function sha256(s){const buf=new TextEncoder().encode(s);const h=await crypto.subtle.digest('SHA-256',buf);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')}

let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(STORE,1);r.onupgradeneeded=e=>{const d=e.target.result;['state','audit','firms','employees','documents'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:s==='state'?undefined:'id'})})};r.onsuccess=e=>{db=e.target.result;res(db)};r.onerror=rej})}
function idbGetAll(s){return new Promise(res=>{const tx=db.transaction(s,'readonly');const q=tx.objectStore(s).getAll();q.onsuccess=()=>res(q.result||[]);q.onerror=()=>res([])})}
function idbGet(s,k){return new Promise(res=>{const tx=db.transaction(s,'readonly');const q=tx.objectStore(s).get(k);q.onsuccess=()=>res(q.result);q.onerror=()=>res(null)})}
function idbPut(s,v,k){return new Promise(res=>{const tx=db.transaction(s,'readwrite');const o=tx.objectStore(s);const q=k!=null?o.put(v,k):o.put(v);q.onsuccess=()=>res(true);q.onerror=()=>res(false)})}
async function loadAll(){if(!db)await openDB();const[firms,emps,docs,auditArr,uiState]=await Promise.all([idbGetAll('firms'),idbGetAll('employees'),idbGetAll('documents'),idbGetAll('audit'),idbGet('state','ui')]);state.firm=firms[0]||null;state.employees=emps;state.documents=docs;state.audit=auditArr.sort((a,b)=>a.i-b.i);if(uiState){state.ui=Object.assign({},state.ui,uiState.value||{});state.settings=Object.assign({},state.settings,uiState.settings||{})}}
async function persistUI(){await idbPut('state',{value:{...state.ui},settings:state.settings},'ui')}
async function auditLog(action,opts={}){if(!state.settings.auditChain)return;const prev=state.audit.length?state.audit[state.audit.length-1]:null;const i=(prev?prev.i:0)+1;const entry={id:uid('au'),i,ts:now(),tool:TOOLNAME,action,reasoning:opts.reasoning||'',configVersion:TOOLNAME+'@'+VERSION,prevHash:prev?.docHash||'',docHash:'',payload:opts.payload||{}};entry.docHash=await sha256(JSON.stringify({i,ts:entry.ts,action,prevHash:entry.prevHash,payload:entry.payload}));state.audit.push(entry);await idbPut('audit',entry)}

let bcHr,bcSignal;
function initMesh(){try{bcSignal=new BroadcastChannel('fall-signal');bcSignal.postMessage({source:TOOLNAME,type:'hello',prime:PRIME,version:VERSION,ts:now()})}catch(e){}try{bcHr=new BroadcastChannel('fall-hr');bcHr.addEventListener('message',async e=>{const m=e.data;if(!m||m.source===TOOLNAME)return;if(m.type==='sync.snapshot'){const p=m.payload||{};if(Array.isArray(p.employees))for(const x of p.employees){if(!state.employees.find(y=>y.id===x.id)){state.employees.push(x);await idbPut('employees',x)}}if(p.firm&&!state.firm){state.firm=p.firm;await idbPut('firms',p.firm)}render()}});bcHr.postMessage({v:1,type:'sync.request',ts:now(),source:TOOLNAME})}catch(e){}}

function buildContext(){const f=state.firm||{};const map={'firm.name':f.name||'','firm.address':f.address||'','firm.companyNo':f.companyNo||'','firm.phone':f.phone||'','firm.email':f.email||''};
  const emp=state.ui.selectedEmployee?state.employees.find(e=>e.id===state.ui.selectedEmployee):null;
  if(emp){const nm=(emp.firstName||'')+' '+(emp.lastName||'');map['employee.name']=emp.name||nm.trim();map['employee.firstName']=emp.firstName||'';map['employee.lastName']=emp.lastName||'';map['employee.address']=emp.address||'';map['employee.email']=emp.email||''}
  const extra=(state.ui.extraContext||'').split('\n');for(const line of extra){const eq=line.indexOf('=');if(eq>0)map['ctx.'+line.slice(0,eq).trim()]=line.slice(eq+1).trim()}
  return map}
function resolveText(text,ctx){return text.replace(/\{\{([^}]+)\}\}/g,(_,key)=>{const v=ctx[key.trim()];return v!=null&&v!==''?String(v):`<span class="placeholder-empty">{{${key.trim()}}}</span>`})}
function renderPaper(tpl,ctx,sections){return `<div class="doc-meta">${esc(tpl.name)} · ${esc(tpl.code)} · ${TOOLNAME} · ${dateStr(now())}</div>\n`+sections.map(s=>{const text=state.ui.editingSections?.[s.id]??s.text;const html=resolveText(text,ctx);if(s.locked)return `<div class="clause-locked">${mdB(html)}</div>`;return mdB(html)}).join('\n')}
function mdB(md){return md.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n\n/g,'</p><p>').replace(/\n(\d+\.\s)/g,'<br>$1').replace(/\n-\s/g,'<br>• ').replace(/\[SIGNATURE_BLOCK\]/g,'<div class="sig-block"><div><div class="sig-line"></div>Signed (Employer)<br>Date: ____________</div><div><div class="sig-line"></div>Signed (Employee)<br>Date: ____________</div></div>').replace(/^/,'<p>').replace(/$/,'</p>')}

function render(){$('#tabNav').innerHTML=TABS.map(t=>`<button class="${state.active===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`).join('');const v=$('#view');switch(state.active){case 'templates':return renderTemplates(v);case 'generate':return renderGenerate(v);case 'documents':return renderDocuments(v);case 'firm':return renderFirm(v);case 'qa':return renderQA(v)}}
function switchTab(id){state.active=id;persistUI();render()}

function renderTemplates(v){const cats=[...new Set(TEMPLATE_DEFS.map(t=>t.cat))];v.innerHTML=`<div class="disclaimer"><strong>◊ Regulatory notice:</strong> FallHRPaper generates HR documents shaped by Employment Rights Act 1996, Equality Act 2010, Working Time Regulations 1998, ACAS Code of Practice, and HMRC PAYE rules. Locked clauses contain statutory or quasi-statutory wording. Editable sections are the employer's responsibility. Take legal advice on contentious matters.</div><div class="section-h"><h2>Templates</h2><div class="sub">${TEMPLATE_DEFS.length} templates</div></div>${cats.map(cat=>`<h3 style="font-family:var(--serif);margin:14px 0 8px;color:var(--brass);text-transform:capitalize">${cat}</h3><div class="tpl-list" style="margin-bottom:14px">${TEMPLATE_DEFS.filter(t=>t.cat===cat).map(t=>`<div class="tpl-row" onclick="selectTemplate('${t.id}')"><div><div class="nm">${esc(t.name)}</div><div class="sub">${esc(t.code)} · ${esc(t.desc)}</div></div><div class="sub">${t.sections.length} sections</div></div>`).join('')}</div>`).join('')}`}
function selectTemplate(id){state.ui.selectedTemplate=id;state.ui.editingSections={};state.active='generate';persistUI();render()}
function renderGenerate(v){const tpl=TEMPLATE_DEFS.find(t=>t.id===state.ui.selectedTemplate);if(!tpl){v.innerHTML='<div class="empty">Select a template from the Templates tab.</div>';return}const ctx=buildContext();v.innerHTML=`<div class="section-h"><h2>${esc(tpl.name)}</h2><div class="actions"><button class="btn brass sm" onclick="saveDocument('draft')">Save draft</button><button class="btn sm" style="border-color:var(--green);color:var(--green)" onclick="saveDocument('issued')">Issue</button><button class="btn ghost sm" onclick="printDoc()">Print</button></div></div><div class="doc-stage"><div class="doc-side"><div class="card"><h3>Employee</h3><select id="empSelect" style="width:100%" onchange="state.ui.selectedEmployee=this.value;persistUI();render()"><option value="">— none —</option>${state.employees.map(e=>`<option value="${e.id}" ${state.ui.selectedEmployee===e.id?'selected':''}>${esc((e.firstName||'')+' '+(e.lastName||''))}</option>`).join('')}</select></div><div class="card"><h3>Extra Context</h3><textarea id="ctxArea" rows="8" style="width:100%;font-size:11px" oninput="state.ui.extraContext=this.value" placeholder="date=2026-06-21&#10;jobTitle=Marketing Manager&#10;startDate=2026-07-15&#10;salary=42000&#10;hours=37.5&#10;holidayDays=28&#10;noticeWeeks=4&#10;probationMonths=6">${esc(state.ui.extraContext||'')}</textarea><div class="hint" style="margin-top:4px;font-family:var(--mono);font-size:10px;color:var(--cream-muted)">key=value per line</div></div><div class="card"><h3>Sections</h3>${tpl.sections.map(s=>`<div class="section-edit ${s.locked?'locked':''}"><div class="hd"><span class="nm">${esc(s.name)}</span><span class="tg">${s.locked?'locked':'editable'}</span></div><textarea rows="3" ${s.locked?'readonly':''} onchange="state.ui.editingSections['${s.id}']=this.value;renderPreview()">${esc(state.ui.editingSections?.[s.id]??s.text)}</textarea></div>`).join('')}</div></div><div><div class="paper" id="paperPreview">${renderPaper(tpl,ctx,tpl.sections)}</div></div></div>`}
function renderPreview(){const tpl=TEMPLATE_DEFS.find(t=>t.id===state.ui.selectedTemplate);if(!tpl)return;const pp=$('#paperPreview');if(pp)pp.innerHTML=renderPaper(tpl,buildContext(),tpl.sections)}
async function saveDocument(status){const tpl=TEMPLATE_DEFS.find(t=>t.id===state.ui.selectedTemplate);if(!tpl){toast('No template');return}const content=renderPaper(tpl,buildContext(),tpl.sections);const hash=await sha256(content);const doc={id:uid('doc'),templateId:tpl.id,templateName:tpl.name,code:tpl.code,employeeId:state.ui.selectedEmployee||'',status,content,hash:hash.slice(0,16),createdAt:now(),sections:{...state.ui.editingSections},extraContext:state.ui.extraContext||''};state.documents.push(doc);await idbPut('documents',doc);await auditLog('document.'+status,{reasoning:tpl.name,payload:{docId:doc.id,hash:doc.hash}});toast(status==='issued'?'Issued':'Draft saved');persistUI();render()}
function printDoc(){const pp=$('#paperPreview');if(!pp)return;const w=window.open('','_blank');w.document.write('<!DOCTYPE html><html><head><title>Print</title><style>body{font-family:Georgia,serif;font-size:13px;line-height:1.7;padding:40px 60px;color:#1a1611}strong{font-weight:700}.clause-locked{background:#f5f0e0;border-left:3px solid #8b1a1a;padding:8px 12px;margin:8px 0;font-size:12px}.sig-block{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:30px}.sig-line{border-bottom:1px solid #000;min-height:38px;margin-bottom:4px}@media print{body{padding:20px}}</style></head><body>'+pp.innerHTML+'</body></html>');w.document.close();w.print()}
function renderDocuments(v){const docs=state.documents.sort((a,b)=>b.createdAt-a.createdAt);v.innerHTML=`<div class="section-h"><h2>Documents</h2><div class="sub">${docs.length}</div></div>${docs.length?`<table><thead><tr><th>Date</th><th>Template</th><th>Code</th><th>Employee</th><th>Status</th><th>Hash</th></tr></thead><tbody>${docs.map(d=>{const emp=state.employees.find(e=>e.id===d.employeeId);return `<tr><td>${dateStr(d.createdAt)}</td><td>${esc(d.templateName)}</td><td>${esc(d.code)}</td><td>${emp?esc(emp.firstName+' '+emp.lastName):'—'}</td><td><span class="pill ${d.status}">${d.status}</span></td><td style="font-family:var(--mono);font-size:10px;color:var(--cream-muted)">${esc(d.hash)}</td></tr>`}).join('')}</tbody></table>`:'<div class="empty">No documents.</div>'}`}
function renderFirm(v){const f=state.firm||{};v.innerHTML=`<div class="section-h"><h2>Firm Setup</h2></div><div class="card" style="max-width:620px"><div class="row"><div class="field"><label>Firm name</label><input id="fName" value="${esc(f.name||'')}"></div><div class="field"><label>Company no</label><input id="fCoNo" value="${esc(f.companyNo||'')}"></div></div><div class="field"><label>Registered address</label><input id="fAddr" value="${esc(f.address||'')}"></div><div class="row"><div class="field"><label>Phone</label><input id="fPhone" value="${esc(f.phone||'')}"></div><div class="field"><label>Email</label><input id="fEmail" value="${esc(f.email||'')}"></div></div><button class="btn brass" onclick="saveFirmForm()" style="margin-top:8px">Save</button></div>`}
async function saveFirmForm(){const f=state.firm||{id:uid('fi'),ts:now()};f.name=$('#fName').value.trim();f.companyNo=$('#fCoNo').value.trim();f.address=$('#fAddr').value.trim();f.phone=$('#fPhone').value.trim();f.email=$('#fEmail').value.trim();f.updatedAt=now();state.firm=f;await idbPut('firms',f);await auditLog('firm.saved');toast('Saved');render()}

const T0_QA=[
  {q:/contract|offer.?letter|day.?one/i,a:'Employment contract: forms on offer + acceptance. Should be in writing but oral contracts also bind. S.1 written statement of particulars must be issued by day one (ERA 1996 s.1 amended). The S.1 statement is the minimum mandatory content; the contract may include additional terms (restrictive covenants, IP assignment, working time opt-out etc).'},
  {q:/s\.?1|statement.?of.?particulars|written.?statement/i,a:'ERA 1996 s.1: written statement of employment particulars must be issued to ALL workers on or before day one. Mandatory contents: parties, dates, pay, hours, holiday, sick pay, notice, location, job description, probation, training, benefits, disciplinary/grievance procedure. Day-one right since 6 Apr 2020. Failure: tribunal award 2-4 weeks pay (Employment Act 2002 s.38).'},
  {q:/disciplin|acas|grieve|hearing/i,a:'ACAS Code of Practice on Disciplinary and Grievance Procedures: investigate fairly → invite to hearing with allegations + evidence + right to be accompanied → hold hearing → decide → notify in writing with right of appeal. Right to be accompanied: Employment Relations Act 1999 s.10 — fellow worker or trade union official. Unreasonable non-compliance: tribunal awards adjusted up to 25% (TULRCA 1992 s.207A).'},
  {q:/redund|consultation|selection|alternative/i,a:'Redundancy: ERA 1996 Pt XI. Genuine redundancy reason (workplace closure or diminishing need for work of particular kind). Fair selection (objective criteria). Consultation (individual + collective if 20+ proposed in 90 days — TULRCA 1992 s.188). Suitable alternative employment offered. Right to time off to seek work (ERA 1996 s.52). Statutory pay: 0.5/1/1.5 weeks per year of service under 22/22-40/41+, capped £719/week (2025), max 20 years.'},
  {q:/settle|compromise|s\.?203|cot3/i,a:'Settlement Agreement (formerly compromise agreement): must comply with ERA 1996 s.203 to validly waive statutory claims. Requirements: in writing, relate to particular complaint, employee received advice from independent adviser (solicitor, certified TU official, advice centre worker — must be insured), state statutory conditions are met. Alternative: COT3 via ACAS (no need for independent adviser). Employer typically contributes £350-£750 to employee\'s legal fees.'},
  {q:/reference|spring|guardian|liability/i,a:'Employment reference: no legal duty to provide one (except in regulated industries like FCA). If provided: duty of care to subject (Spring v Guardian Assurance plc [1995] 2 AC 296) and duty of accuracy to recipient. Best practice: factual reference only (job title, dates, reason for leaving, final salary). Avoid opinions on suitability. Keep records. GDPR: subject can SAR the reference (some exemptions apply to referee opinions).'},
  {q:/restrictive.?covenant|non.?compete|garden|leave/i,a:'Restrictive covenants enforceable only if reasonable to protect legitimate business interest (trade secrets, customer connections, workforce stability). Reasonableness: scope (activities), geographic area, duration, time when imposed. Non-compete: typically 3-6 months max. Non-solicit: 6-12 months. Non-deal: similar. Garden leave: paid period of non-work post-notice; deductible from non-compete period. May 2023: UK govt consulted on capping non-competes at 3 months — not yet legislated as of 2026.'},
  {q:/working.?time|wtr|opt.?out|48/i,a:'Working Time Regulations 1998: 48-hour weekly average (reference period 17 weeks) unless opted out in writing. Opt-out can be withdrawn by giving up to 3 months notice. Rest breaks: 20 min if working over 6 hours. Daily rest: 11 hours consecutive. Weekly rest: 24 hours per 7-day period. Night work: 8 hours average per 24. Records must be kept 2 years. 5.6 weeks paid annual leave.'},
];
function askT0(q){for(const r of T0_QA){if(r.q.test(q))return {answer:r.a,source:'T0 · UK HR docs'}}return null}
async function askT3(q){if(!state.settings.anthropicKey)return null;try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'x-api-key':state.settings.anthropicKey,'anthropic-version':'2023-06-01','content-type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:'You are a UK HR/employment law documents expert. ERA 1996, Equality Act 2010, ACAS Code, WTR 1998, settlement agreements. Concise.\n\n'+q}]})});if(!res.ok)return null;const j=await res.json();return {answer:j.content?.[0]?.text,source:'T3 · Anthropic'}}catch(e){return null}}
function renderQA(v){v.innerHTML=`<div class="section-h"><h2>Q & A</h2><div class="sub">T0 + T3 BYOK</div></div><div class="card" style="max-width:780px"><div class="chat" id="chatBox">${(state.ui.chat||[]).map(m=>`<div class="msg ${m.role}">${esc(m.text)}${m.source?`<div class="src">${esc(m.source)}</div>`:''}</div>`).join('')}</div><div class="chat-input"><input id="chatIn" placeholder="Ask… 'S.1 requirements?' · 'settlement agreement validity?' · 'ACAS Code uplift?'" onkeydown="if(event.key==='Enter')askQ()"><button class="btn brass" onclick="askQ()">Ask</button></div></div>`;const box=$('#chatBox');if(box)box.scrollTop=box.scrollHeight}
async function askQ(){const inp=$('#chatIn');if(!inp)return;const q=inp.value.trim();if(!q)return;inp.value='';if(!state.ui.chat)state.ui.chat=[];state.ui.chat.push({role:'user',text:q});render();let r=askT0(q);if(!r)r=await askT3(q);state.ui.chat.push(r?{role:'bot',text:r.answer,source:r.source}:{role:'bot',text:'No T0 match. Add BYOK key for T3.',source:'system'});persistUI();render()}

function openModal(type){const modal=$('#modal');$('#modalTitle').textContent='Settings';modal.classList.add('open');$('#modalBody').innerHTML=`<div class="field"><label>Anthropic key (T3)</label><input type="password" id="sKey" value="${esc(state.settings.anthropicKey||'')}"></div><div style="margin:10px 0"><label style="font-size:12px"><input type="checkbox" id="sAudit" ${state.settings.auditChain?'checked':''}> Audit chain</label></div><div class="actions"><button class="btn ghost sm" onclick="exportAll()">Export</button><button class="btn ghost sm" onclick="importAll()">Import</button><button class="btn danger sm" onclick="wipeAll()">Wipe</button><button class="btn brass" onclick="saveSettings()">Save</button><button class="btn ghost" onclick="closeModal()">Cancel</button></div>`}
function closeModal(){$('#modal').classList.remove('open')}
function saveSettings(){state.settings.anthropicKey=$('#sKey').value.trim();state.settings.auditChain=$('#sAudit').checked;$('#tierBadge').textContent=state.settings.anthropicKey?'T3':'T0';persistUI();closeModal();toast('Saved');render()}
function exportAll(){const d={tool:TOOLNAME,v:VERSION,ts:now(),firm:state.firm,employees:state.employees,documents:state.documents};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='fallhrpaper-export.json';a.click();URL.revokeObjectURL(u);toast('Exported')}
function importAll(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=async()=>{const f=inp.files[0];if(!f)return;try{const d=JSON.parse(await f.text());if(d.firm){state.firm=d.firm;await idbPut('firms',d.firm)}for(const k of['employees','documents']){if(Array.isArray(d[k]))for(const r of d[k]){state[k].push(r);await idbPut(k,r)}}persistUI();toast('Imported');render()}catch(e){toast('Failed')}};inp.click()}
async function wipeAll(){if(!confirm('Wipe ALL data?'))return;for(const s of['firms','employees','documents','audit','state']){const tx=db.transaction(s,'readwrite');tx.objectStore(s).clear();await new Promise(r=>{tx.oncomplete=r})}location.reload()}

async function seedDemo(){if(state.employees.length||state.firm)return;
  const firm={id:uid('fi'),name:'Northgate Sciences Ltd',address:'21 King Street, Manchester M2 4WQ',companyNo:'09876543',phone:'0161 555 0100',email:'hr@northgate.co.uk',updatedAt:now(),isDemo:true};
  state.firm=firm;await idbPut('firms',firm);
  const e1={id:uid('em'),firstName:'Sarah',lastName:'Lewis',email:'s.lewis@northgate.co.uk',address:'14 Elm Street, Manchester M14 5PR',ts:now(),isDemo:true};
  const e2={id:uid('em'),firstName:'Adam',lastName:'Ross',email:'a.ross@northgate.co.uk',address:'7 Cedar Avenue, Stockport SK4 2BT',ts:now(),isDemo:true};
  state.employees=[e1,e2];await idbPut('employees',e1);await idbPut('employees',e2);
  await auditLog('demo.seeded',{reasoning:'first boot'});await persistUI()}

(async function boot(){try{await openDB();await loadAll();await seedDemo();initMesh();$('#tierBadge').textContent=state.settings.anthropicKey?'T3':'T0';render()}catch(e){console.error('[fallhrpaper] boot error:',e);document.getElementById('view').innerHTML='<div class="empty">Boot error: '+esc(e.message)+'</div>'}})();
</script>
</body>
